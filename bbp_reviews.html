<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBP Reviews</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      color: #c9a84c;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }

    h1 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 36px;
      letter-spacing: 0.02em;
    }

    .stores {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    a.store-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 22px 24px;
      text-decoration: none;
      transition: background-color 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    a.store-btn:active {
      transform: scale(0.98);
      background-color: #333;
    }

    .store-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .store-name {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .store-city {
      color: #888;
      font-size: 13px;
      font-weight: 400;
    }

    .arrow {
      color: #c9a84c;
      font-size: 22px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .footer {
      margin-top: 40px;
      color: #444;
      font-size: 11px;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="logo">Big Brothers Pawn</div>
  <h1>Google Reviews</h1>

  <div class="stores">

    <a class="store-btn" href="https://www.google.com/maps/place/Big+Brother's+Pawn/@36.17479,-94.1383142,17z/data=!4m8!3m7!1s0x87c96b4376b47841:0xb33abc7a4b862f4a!8m2!3d36.17479!4d-94.1383142!9m1!1b1!16s%2Fg%2F1tklr22h?hl=en-US&entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank">
      <div class="store-info">
        <span class="store-name">Springdale</span>
        <span class="store-city">802 W Sunset Avenue</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="store-btn" href="https://www.google.com/maps/place/Big+Brother's+Pawn/@36.3140511,-94.1269014,17z/data=!4m8!3m7!1s0x87c916e68a62d019:0x4d10f689c1327367!8m2!3d36.3140511!4d-94.1269014!9m1!1b1!16s%2Fg%2F1wf22cvk?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank">
      <div class="store-info">
        <span class="store-name">Rogers</span>
        <span class="store-city">1806 S 8th Street</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="store-btn" href="https://www.google.com/maps/place/Big+Brothers+Pawn/@36.3726971,-94.2209384,17z/data=!4m8!3m7!1s0x87c91aa4c9991c67:0x1d22cc73ece65665!8m2!3d36.3726971!4d-94.2209384!9m1!1b1!16s%2Fg%2F1td3gk3r?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank">
      <div class="store-info">
        <span class="store-name">Bentonville</span>
        <span class="store-city">102 N Walton Boulevard</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="store-btn" href="https://www.google.com/maps/place/Big+Brothers+Pawn/@36.1738828,-94.5507082,17z/data=!4m8!3m7!1s0x87c99808f4f2d411:0x6ab750eaeeb79f26!8m2!3d36.1738828!4d-94.5507082!9m1!1b1!16s%2Fg%2F11cn2mhm64?hl=en-US&entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank">
      <div class="store-info">
        <span class="store-name">Siloam Springs</span>
        <span class="store-city">904 W Kenwood Street</span>
      </div>
      <span class="arrow">›</span>
    </a>

  </div>

  <div class="footer">TAP A LOCATION TO VIEW &amp; REPLY TO REVIEWS</div>

</body>
</html>
